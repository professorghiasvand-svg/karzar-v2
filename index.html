<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کارزار v-2</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #202124;
            --search-bg: #ffffff;
            --search-border: #dfe1e5;
            --search-shadow: 0 1px 6px rgba(32,33,36,0.28);
            --card-hover: #f8f9fa;
            --link-color: #1a0dab;
            --snippet-color: #4d5156;
        }

        [data-theme="dark"] {
            --bg-color: #202124;
            --text-color: #e8eaed;
            --search-bg: #303134;
            --search-border: #5f6368;
            --search-shadow: 0 1px 6px rgba(0,0,0,0.5);
            --card-hover: #3c4043;
            --link-color: #8ab4f8;
            --snippet-color: #bdc1c6;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            transition: background 0.3s ease;
        }

        /* دکمه تغییر تم */
        .theme-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--search-border);
            background: var(--search-bg);
            color: var(--text-color);
            font-size: 14px;
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 100px;
        }

        /* لوگوی رنگی کارزار */
        .logo {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }
        .logo span:nth-child(1) { color: #4285F4; } /* ک - آبی */
        .logo span:nth-child(2) { color: #EA4335; } /* ا - قرمز */
        .logo span:nth-child(3) { color: #FBBC05; } /* ر - زرد */
        .logo span:nth-child(4) { color: #4285F4; } /* ز - آبی */
        .logo span:nth-child(5) { color: #34A853; } /* ا - سبز */
        .logo span:nth-child(6) { color: #EA4335; } /* ر - قرمز */

        .search-container {
            width: 100%;
            max-width: 584px;
            position: relative;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--search-bg);
            border: 1px solid var(--search-border);
            border-radius: 24px;
            padding: 5px 15px;
            transition: box-shadow 0.2s;
        }

        .search-box:hover, .search-box:focus-within {
            box-shadow: var(--search-shadow);
            border-color: transparent;
        }

        input {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-color);
            padding: 10px;
            font-size: 16px;
            outline: none;
        }

        .results-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .result-item {
            margin-bottom: 30px;
            display: block;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .result-item:hover {
            background: var(--card-hover);
        }

        .result-url {
            font-size: 14px;
            color: var(--text-color);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .favicon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        .result-title {
            font-size: 20px;
            color: var(--link-color);
            margin: 0 0 5px 0;
            font-weight: normal;
        }

        .result-title:hover {
            text-decoration: underline;
        }

        .result-snippet {
            font-size: 14px;
            color: var(--snippet-color);
            line-height: 1.5;
        }

        #loading {
            text-align: center;
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">تغییر حالت نمایش</button>

    <div class="header" id="headerSection">
        <div class="logo">
            <span>ک</span><span>ا</span><span>ر</span><span>ز</span><span>ا</span><span>ر</span>
        </div>
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="جستجو در کارزار..." onkeypress="if(event.key === 'Enter') search()">
            </div>
        </div>
    </div>

    <div class="results-container">
        <div id="loading">در حال جستجو...</div>
        <div id="results"></div>
    </div>

    <script>
        // مدیریت تم
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'dark');
            }
        }

        async function search() {
            const query = document.getElementById('searchInput').value;
            const resultsDiv = document.getElementById('results');
            const loading = document.getElementById('loading');
            const header = document.getElementById('headerSection');

            if (!query) return;

            // کوچک کردن هدر بعد از اولین جستجو (شبیه گوگل)
            header.style.marginTop = '20px';
            
            loading.style.display = 'block';
            resultsDiv.innerHTML = '';

            try {
                const workerUrl = `https://karzar.professor-ghiasvand.workers.dev/?q=${encodeURIComponent(query)}`;
                const response = await fetch(workerUrl);
                const data = await response.json();

                loading.style.display = 'none';

                if (data.results && data.results.length > 0) {
                    data.results.forEach(result => {
                        const domain = new URL(result.url).hostname;
                        const faviconUrl = `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;

                        const item = `
                            <a href="${result.url}" target="_blank" class="result-item">
                                <div class="result-url">
                                    <img src="${faviconUrl}" class="favicon">
                                    <span>${result.url}</span>
                                </div>
                                <h3 class="result-title">${result.title}</h3>
                                <p class="result-snippet">${result.description}</p>
                            </a>
                        `;
                        resultsDiv.innerHTML += item;
                    });
                } else {
                    resultsDiv.innerHTML = '<p>نتیجه‌ای یافت نشد.</p>';
                }
            } catch (error) {
                loading.style.display = 'none';
                resultsDiv.innerHTML = '<p>خطا در دریافت اطلاعات.</p>';
            }
        }
    </script>
</body>
</html>
