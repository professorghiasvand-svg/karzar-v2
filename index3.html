<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موتور جستجوی کارزار v-2</title>
    <style>
        :root { --bg: #0d1117; --accent: #58a6ff; --card: #161b22; --text: #c9d1d9; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: Tahoma, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 50px; background: #21262d; display: flex; align-items: center; justify-content: center; border-left: 1px solid #30363d; }
        .sidebar-text { writing-mode: vertical-rl; transform: rotate(180deg); font-size: 18px; font-weight: bold; color: var(--accent); letter-spacing: 5px; opacity: 0.7; }

        /* Main Content */
        .main { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .header { text-align: center; margin-top: 50px; margin-bottom: 30px; }
        .logo { font-size: 50px; font-weight: 900; color: white; letter-spacing: -2px; }
        .v2 { color: var(--accent); font-size: 20px; vertical-align: top; }

        .search-box { position: relative; max-width: 600px; margin: 0 auto 40px auto; width: 100%; }
        input { width: 100%; padding: 15px 25px; border-radius: 30px; border: 1px solid #30363d; background: var(--card); color: white; font-size: 18px; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(88,166,255,0.2); }

        #results { max-width: 700px; margin: 0 auto; width: 100%; }
        .result-card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #30363d; animation: slideUp 0.4s ease; }
        .result-card a { color: var(--accent); text-decoration: none; font-size: 19px; font-weight: bold; display: block; margin-bottom: 8px; }
        .result-card p { margin: 0; font-size: 15px; line-height: 1.6; color: #8b949e; }
        .loading { text-align: center; color: var(--accent); font-style: italic; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar"><div class="sidebar-text">KARZAR v-2</div></div>

    <div class="main">
        <div class="header">
            <div class="logo">KARZAR <span class="v2">v-2</span></div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="در دنیای کارزار جستجو کن..." onkeypress="if(event.key==='Enter') search()">
        </div>

        <div id="results"></div>
    </div>

    <script>
        async function search() {
            const query = document.getElementById('searchInput').value;
            const container = document.getElementById('results');
            if (!query) return;

            container.innerHTML = '<div class="loading">در حال فراخوانی اطلاعات از ورکر اختصاصی...</div>';

            try {
                // اتصال به ورکری که همین الان ساختی
                const response = await fetch(`https://karzar.professor-ghiasvand.workers.dev/?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                container.innerHTML = '';

                if (data.AbstractText) {
                    container.innerHTML += `
                        <div class="result-card">
                            <a href="${data.AbstractURL}" target="_blank">${data.Heading}</a>
                            <p>${data.AbstractText}</p>
                        </div>`;
                }

                if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                    data.RelatedTopics.slice(0, 5).forEach(item => {
                        if (item.Text) {
                            container.innerHTML += `
                                <div class="result-card">
                                    <a href="${item.FirstURL}" target="_blank">${item.Text.split(' - ')[0] || 'نتیجه مرتبط'}</a>
                                    <p>${item.Text}</p>
                                </div>`;
                        }
                    });
                }

                if (container.innerHTML === '') {
                    container.innerHTML = '<div style="text-align:center">نتیجه‌ای در کارزار یافت نشد.</div>';
                }

            } catch (error) {
                container.innerHTML = '<div style="text-align:center; color: #ff7b72;">خطا در اتصال به موتور جستجو. مطمئن شوید ورکر Deploy شده است.</div>';
            }
        }
    </script>
</body>
</html>
